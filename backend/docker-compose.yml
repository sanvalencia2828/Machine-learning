services:
  postgres:
    image: postgres:16-alpine
    container_name: pml_postgres
    environment:
      POSTGRES_USER: pml_admin
      POSTGRES_PASSWORD: pml_secret_2024
      POSTGRES_DB: pml_finance
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pml_admin -d pml_finance"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
