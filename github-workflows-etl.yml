name: ETL - Process Course Content

on:
  push:
    paths:
      - 'chapters/**'
      - 'code/**'
      - 'etl/**'
    branches: [main]
  workflow_dispatch:
    inputs:
      course_id:
        description: 'Course ID to process'
        required: true
      dry_run:
        description: 'Dry run (no database writes)'
        required: false
        default: 'false'

jobs:
  etl-process:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_DB: ml_course
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true  # Fetch large files
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        working-directory: etl
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Download spacy models
        run: |
          python -m spacy download en_core_web_sm
          python -m spacy download es_core_news_sm
      
      - name: Configure database
        env:
          DATABASE_URL: postgresql://postgres:${{ secrets.DB_PASSWORD }}@localhost:5432/ml_course
        run: |
          cd backend
          npx prisma migrate deploy || true
      
      - name: Run ETL pipeline
        working-directory: etl
        env:
          COURSE_ID: ${{ github.event.inputs.course_id || 'ml_course_001' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          DATABASE_URL: postgresql://postgres:${{ secrets.DB_PASSWORD }}@localhost:5432/ml_course
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: |
          python -m etl.pipeline \
            --course-id $COURSE_ID \
            --source ./chapters \
            $([ "$DRY_RUN" = "true" ] && echo "--dry-run" || echo "")
      
      - name: Upload content.json artifact
        uses: actions/upload-artifact@v3
        if: success()
        with:
          name: content-feed
          path: output/
          retention-days: 30
      
      - name: Deploy content.json to S3
        if: success() && github.event.inputs.dry_run != 'true'
        run: |
          aws s3 cp output/ s3://${{ secrets.S3_BUCKET_NAME }}/content-feeds/ \
            --recursive \
            --region ${{ secrets.AWS_REGION }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      
      - name: Invalidate CloudFront cache
        if: success() && github.event.inputs.dry_run != 'true'
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      
      - name: Send notification
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            ETL Pipeline: ${{ job.status }}
            Course: ${{ github.event.inputs.course_id }}
            Commit: ${{ github.sha }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          fields: repo,message,commit,author
      
      - name: Comment on commit
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ ETL Pipeline failed. Check the workflow logs for details.'
            })
